<div class="admin-wrapper" [class.collapsed]="sidebarCollapsed">

  <!-- ═══════════════ SIDEBAR ═══════════════ -->
  <aside class="sidebar">

    <!-- Logo -->
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#1DB954" stroke-width="2"/>
          <circle cx="12" cy="12" r="4" fill="#1DB954"/>
          <line x1="12" y1="2" x2="12" y2="6" stroke="#1DB954" stroke-width="2"/>
          <line x1="12" y1="18" x2="12" y2="22" stroke="#1DB954" stroke-width="2"/>
          <line x1="2" y1="12" x2="6" y2="12" stroke="#1DB954" stroke-width="2"/>
          <line x1="18" y1="12" x2="22" y2="12" stroke="#1DB954" stroke-width="2"/>
        </svg>
      </div>
      <span class="logo-text">Haida<span class="logo-accent">Admin</span></span>
      <!-- Botón colapsar — visible solo cuando el sidebar está abierto -->
      <button class="toggle-btn" (click)="toggleSidebar()" title="Colapsar menú">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">
      <p class="nav-section-label">Principal</p>
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item">
        <span class="nav-item-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </span>
        <span class="nav-item-label">Dashboard</span>
      </a>
      <a routerLink="/admin/pedidos" routerLinkActive="active" class="nav-item">
        <span class="nav-item-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10V20a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V10"/><path d="M1 6h22v4H1z"/><path d="M10 16H14"/></svg>
        </span>
        <span class="nav-item-label">Pedidos</span>
      </a>
      <a routerLink="/admin/productos" routerLinkActive="active" class="nav-item">
        <span class="nav-item-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/><line x1="3" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="21" y2="12"/></svg>
        </span>
        <span class="nav-item-label">Productos</span>
      </a>
      <a routerLink="/admin/categorias" routerLinkActive="active" class="nav-item">
        <span class="nav-item-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
        </span>
        <span class="nav-item-label">Categorías</span>
      </a>
      <a routerLink="/admin/usuarios" routerLinkActive="active" class="nav-item">
        <span class="nav-item-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </span>
        <span class="nav-item-label">Usuarios</span>
      </a>
      <a routerLink="/admin/pagos" routerLinkActive="active" class="nav-item">
        <span class="nav-item-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        </span>
        <span class="nav-item-label">Pagos</span>
      </a>

      <div class="nav-divider"></div>
      <p class="nav-section-label">Sistema</p>

      <a routerLink="/home" class="nav-item">
        <span class="nav-item-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </span>
        <span class="nav-item-label">Ver tienda</span>
      </a>
      <a (click)="logout()" class="nav-item nav-logout">
        <span class="nav-item-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </span>
        <span class="nav-item-label">Cerrar sesión</span>
      </a>
    </nav>

    <!-- User card -->
    <div class="sidebar-user">
      <div class="user-avatar">{{ userInitial }}</div>
      <div class="user-info">
        <span class="user-name">{{ userName }}</span>
        <span class="user-badge">Administrador</span>
      </div>
    </div>
  </aside>

  <!-- ═══════════════ MAIN ═══════════════ -->
  <div class="admin-main">

    <header class="topbar">
      <!-- Botón REABRIR sidebar — solo aparece cuando está colapsado -->
      <button class="topbar-expand-btn" (click)="toggleSidebar()" title="Abrir menú">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>

      <!-- Botón hamburguesa móvil -->
      <button class="topbar-menu-btn" (click)="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>

      <div class="topbar-right">
        <div class="topbar-avatar">{{ userInitial }}</div>
      </div>
    </header>

    <main class="page-content">
      <router-outlet />
    </main>
  </div>
</div>
