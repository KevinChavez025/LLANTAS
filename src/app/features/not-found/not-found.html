<div class="not-found">
  <div class="not-found__container">

    <!-- Ícono llanta animada -->
    <div class="not-found__icon">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
        <circle cx="50" cy="50" r="45" stroke="#1DB954" stroke-width="6"/>
        <circle cx="50" cy="50" r="20" stroke="#1DB954" stroke-width="4"/>
        <line x1="50" y1="5" x2="50" y2="30" stroke="#1DB954" stroke-width="3" stroke-linecap="round"/>
        <line x1="50" y1="70" x2="50" y2="95" stroke="#1DB954" stroke-width="3" stroke-linecap="round"/>
        <line x1="5" y1="50" x2="30" y2="50" stroke="#1DB954" stroke-width="3" stroke-linecap="round"/>
        <line x1="70" y1="50" x2="95" y2="50" stroke="#1DB954" stroke-width="3" stroke-linecap="round"/>
        <line x1="18" y1="18" x2="36" y2="36" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
        <line x1="64" y1="64" x2="82" y2="82" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
        <line x1="82" y1="18" x2="64" y2="36" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
        <line x1="36" y1="64" x2="18" y2="82" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>

    <h1 class="not-found__code">404</h1>
    <h2 class="not-found__title">¡Página no encontrada!</h2>
    <p class="not-found__desc">
      Parece que esta llanta se pinchó en el camino.<br>
      La página que buscas no existe o fue movida.
    </p>

    <div class="not-found__actions">
      <a routerLink="/home" class="btn btn-primary btn-lg">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Ir al inicio
      </a>
      <a routerLink="/catalogo" class="btn btn-secondary btn-lg">
        Ver catálogo
      </a>
    </div>

    <p class="not-found__hint">
      ¿Necesitas ayuda? 
      <a [href]="whatsappUrl" target="_blank" rel="noopener">Escríbenos por WhatsApp</a>
    </p>

  </div>
</div>
